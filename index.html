<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SHIELDR — Protect your planet from endless waves of enemies. Place force fields, earn items, and climb the leaderboard." />
  <meta property="og:title" content="SHIELDR — Protect Your Planet" />
  <meta property="og:description" content="Defend your planet from endless waves of enemies. Place force fields, earn powerful items, and survive as long as you can." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/ShieldROGimage.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SHIELDR — Protect Your Planet" />
  <meta name="twitter:description" content="Defend your planet from endless waves of enemies. Place force fields, earn powerful items, and survive as long as you can." />
  <meta name="twitter:image" content="/ShieldROGimage.png" />
  <title>SHIELDR — Protect Your Planet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
    #game-container { width: 100vw; height: 100vh; }
    #game-container canvas { display: block; }

    #username-modal {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #username-modal.hidden { display: none !important; }
    .modal-box {
      position: relative;
      background: rgba(11, 18, 36, 0.96);
      border: 1.5px solid rgba(42, 74, 112, 0.9);
      border-radius: 14px;
      padding: 44px 48px 32px;
      text-align: center;
      min-width: 360px;
    }
    .modal-box::before,
    .modal-box::after,
    .modal-box > .bracket-bl,
    .modal-box > .bracket-br {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: #4aa4ff;
      border-style: solid;
      border-width: 0;
    }
    .modal-box::before {
      top: 10px; left: 10px;
      border-top-width: 2px; border-left-width: 2px;
    }
    .modal-box::after {
      top: 10px; right: 10px;
      border-top-width: 2px; border-right-width: 2px;
    }
    .modal-box > .bracket-bl {
      bottom: 10px; left: 10px;
      border-bottom-width: 2px; border-left-width: 2px;
    }
    .modal-box > .bracket-br {
      bottom: 10px; right: 10px;
      border-bottom-width: 2px; border-right-width: 2px;
    }
    .modal-box h2 {
      position: relative;
      color: #ffffff;
      font-size: 22px;
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-weight: 700;
    }
    .modal-box h2::after {
      content: '';
      display: block;
      width: 48px;
      height: 2px;
      background: #4aa4ff;
      opacity: 0.85;
      margin: 8px auto 0;
    }
    .modal-box p {
      color: #8899aa;
      font-size: 13px;
      margin-bottom: 22px;
      min-height: 18px;
    }
    #username-input {
      background: rgba(10, 16, 32, 0.9);
      border: 1.5px solid #2a4a70;
      border-radius: 8px;
      color: #dbeaff;
      font-size: 18px;
      padding: 12px 20px;
      text-align: center;
      width: 260px;
      outline: none;
      letter-spacing: 2px;
      font-family: inherit;
      font-weight: 600;
      transition: border-color 0.15s;
    }
    #username-input:focus { border-color: #4aa4ff; }
    #username-input.error { border-color: #cc4455; }
    #username-hint.error { color: #cc4455; }
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 26px;
    }
    .modal-btn {
      background: rgba(11, 18, 36, 0.8);
      border: 1.5px solid rgba(74, 164, 255, 0.55);
      border-radius: 8px;
      color: #dbeaff;
      font-size: 15px;
      padding: 10px 32px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: inherit;
      font-weight: 700;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .modal-btn:hover {
      background: rgba(11, 18, 36, 0.95);
      border-color: #4aa4ff;
      color: #ffffff;
    }
    .modal-btn.cancel {
      border-color: rgba(102, 119, 136, 0.55);
      color: #8899aa;
    }
    .modal-btn.cancel:hover {
      border-color: #aabbcc;
      color: #ffffff;
    }
    .modal-btn.hidden { display: none !important; }

    #storage-notice {
      display: none;
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 170, 0, 0.12);
      border: 1px solid rgba(255, 170, 0, 0.4);
      color: #fa0;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="username-modal">
    <div class="modal-box">
      <span class="bracket-bl"></span>
      <span class="bracket-br"></span>
      <h2 id="username-title">Enter Your Name</h2>
      <p id="username-hint">&nbsp;</p>
      <input type="text" id="username-input" value="StarWard" autocomplete="off" spellcheck="false" />
      <div class="modal-buttons">
        <button id="username-cancel" class="modal-btn cancel hidden">Cancel</button>
        <button id="username-submit" class="modal-btn">Begin</button>
      </div>
    </div>
  </div>

  <div id="storage-notice">Storage unavailable — scores won't be saved</div>

  <script>document.addEventListener('contextmenu', e => e.preventDefault());</script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
